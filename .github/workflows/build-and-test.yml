name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - "**.js"
      - ".github/workflows/*.yml"
      - "package.json"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: |
          npm ci
          npm run format -- --check
      - name: Lint with Oxlint
        run: npm run lint
      - name: Lint with ESLint
        run: npm run eslint
  build:
    name: Testing
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 24
          - os: ubuntu-24.04-arm
            node-version: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: |
          npm ci
          npm run test
