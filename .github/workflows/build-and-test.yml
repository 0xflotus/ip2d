name: Build and Test App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - "**.js"
      - ".github/workflows/*.yml"
      - "package.json"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: |
          npm ci
          npm run format -- --check
      - uses: oxc-project/oxlint-action@v3.0.0
        with:
          deny: |
            correctness
            no-eval
          warn: |
            suspicious
            perf
  build:
    name: Testing
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, ubuntu-slim]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: |
          npm ci
          npm run test
